interface:
  display_name: "Yao GEO Effect Monitor"
  short_description: "Design a GEO Signal Monitor for AI answer monitoring, citation tracking, correction tasks, alerts, monthly reporting, and cautious attribution."
  default_prompt: "Use $yao-geo-effect-monitor to design a GEO Signal Monitor across DeepSeek, Doubao, Qianwen, Kimi, and Tencent Yuanbao. Build platform-specific sampling rules, a grouped monitoring prompt library, answer and citation metrics, brand-fact correction tasks, alert thresholds, monthly report structure, dashboard fields, database tables, API draft, and four-format deliverables."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
