<style>
@page { size: A4 landscape; margin: 14mm; }
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #ffffff; color: #18202a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 13px; line-height: 1.58; }
body { padding: 30px 18px 46px; }
body > * { max-width: 1080px; margin-left: auto; margin-right: auto; }
h1 { font-size: 25px; line-height: 1.25; margin: 0 auto 14px; color: #0f1720; }
h2 { font-size: 17px; line-height: 1.35; margin-top: 22px; margin-bottom: 8px; padding-top: 10px; border-top: 1px solid #dbe2ea; color: #142033; break-after: avoid; }
p { margin: 7px auto; }
blockquote { margin: 10px auto 16px; padding: 9px 12px; border-left: 4px solid #2f6f9f; background: #f5f8fb; color: #2a3a4b; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; margin: 10px auto 16px; background: #ffffff; }
th, td { border: 1px solid #d8dee7; padding: 6px 7px; text-align: left; vertical-align: top; word-break: break-word; overflow-wrap: anywhere; }
th { background: #f2f5f9; color: #172033; font-weight: 700; }
tr { break-inside: avoid; }
code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px; background: #f5f7fa; padding: 1px 3px; border-radius: 3px; }
ul { padding-left: 21px; }
@media print { body { padding: 0; } }
</style>
